name: Docker Version Bot

on:
  schedule:
    # 每 2 小时执行一次。GitHub Actions schedule 使用 UTC 时间。
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only preview, do not push changes"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_new:
        description: "Max new versions per app, empty means config default"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: docker-version-bot
  cancel-in-progress: false

env:
  APPSTORE_REPO: mengfox/1panel-appstore
  APPSTORE_BRANCH: main

jobs:
  sync:
    name: Check Docker/GitHub versions and update AppStore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v6
        with:
          path: bot

      - name: Checkout 1Panel AppStore repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.APPSTORE_REPO }}
          ref: ${{ env.APPSTORE_BRANCH }}
          token: ${{ secrets.APPSTORE_PUSH_TOKEN }}
          path: appstore
          fetch-depth: 0

      - name: Prepare target branch
        run: |
          set -e
          cd appstore
          git checkout -B "${APPSTORE_BRANCH}" "origin/${APPSTORE_BRANCH}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          set -euo pipefail
          python3 -m py_compile bot/tools/docker-version-sync.py
          if [ -f bot/tools/cleanup-workflow-runs.py ]; then
            python3 -m py_compile bot/tools/cleanup-workflow-runs.py
          fi

      - name: Dry run preview
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          MAX_NEW_INPUT: ${{ github.event.inputs.max_new }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ -n "${MAX_NEW_INPUT:-}" ]; then
            if ! echo "$MAX_NEW_INPUT" | grep -Eq '^[0-9]+$'; then
              echo "::error::max_new must be a non-negative integer"
              exit 1
            fi
            EXTRA_ARGS=(--max-new "$MAX_NEW_INPUT")
          fi

          python3 bot/tools/docker-version-sync.py \
            --repo-root appstore \
            --config "$GITHUB_WORKSPACE/bot/config/docker-version-sync.json" \
            --dry-run \
            "${EXTRA_ARGS[@]}"

      - name: Sync versions and push
        if: ${{ github.event_name == 'schedule' || github.event.inputs.dry_run == 'false' }}
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          MAX_NEW_INPUT: ${{ github.event.inputs.max_new }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ -n "${MAX_NEW_INPUT:-}" ]; then
            if ! echo "$MAX_NEW_INPUT" | grep -Eq '^[0-9]+$'; then
              echo "::error::max_new must be a non-negative integer"
              exit 1
            fi
            EXTRA_ARGS=(--max-new "$MAX_NEW_INPUT")
          fi

          python3 bot/tools/docker-version-sync.py \
            --repo-root appstore \
            --config "$GITHUB_WORKSPACE/bot/config/docker-version-sync.json" \
            --write \
            --commit \
            --push \
            --push-branch "${APPSTORE_BRANCH}" \
            "${EXTRA_ARGS[@]}"

  cleanup-workflow-runs:
    name: Cleanup workflow records
    runs-on: ubuntu-latest
    needs: sync
    if: ${{ always() && (github.event_name == 'schedule' || github.event.inputs.dry_run == 'false') }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v6
        with:
          path: bot

      - name: Cleanup old workflow records
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ ! -f bot/tools/cleanup-workflow-runs.py ]; then
            echo "::warning::缺少 bot/tools/cleanup-workflow-runs.py，已跳过工作流记录清理。请更新到包含该脚本的版本。"
            exit 0
          fi

          set +e
          python3 bot/tools/cleanup-workflow-runs.py \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow "docker-version-bot.yml" \
            --keep-success 3 \
            --keep-failure-days 3 \
            --exclude-run-id "${GITHUB_RUN_ID}" \
            --delete-records
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning::工作流记录清理失败，退出码：${status}。主同步任务已完成，本次不会因为清理失败而标记失败。"
          fi
          exit 0
